# Lint gate for docs/STYLE.md — the machine-checkable subset only.
# Deliberately lean: rules needing judgment (T4 duplicate structures,
# D2 map-iteration-into-output, D3 derivable state) stay with the arbiter
# and warden; do not pile on linters to approximate them.
version: "2"

linters:
  default: none
  enable:
    # correctness baseline
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    # S3/E1: no dropped errors, correct wrapping/matching
    - errcheck
    - errorlint
    - nilerr
    # S1/S2: happy path left, no else blocks
    - revive
    # T1/T2: closed-sum switches cover all cases
    - exhaustive
    # L1: injected slog only, no globals
    - sloglint
    # LESSONS 21 / L1: no whole-document buffering, no print debugging
    - forbidigo
  settings:
    revive:
      rules:
        - name: early-return
        - name: superfluous-else
        - name: indent-error-flow
    exhaustive:
      default-signifies-exhaustive: true
    sloglint:
      no-global: all
    forbidigo:
      analyze-types: true
      forbid:
        - pattern: ^io\.ReadAll$
          msg: stream with bounded buffering instead (docs/LESSONS.md 21)
        - pattern: ^fmt\.Print(f|ln)?$
          msg: use the injected slog logger (docs/STYLE.md L1)
  exclusions:
    rules:
      # tests may buffer and print freely
      - path: _test\.go
        linters: [forbidigo]
      # CLIs under tools/ print to stdout by design
      - path: ^tools/
        linters: [forbidigo, sloglint]

formatters:
  enable:
    - gofmt
